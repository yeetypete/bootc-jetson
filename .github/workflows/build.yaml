name: build

on:
  workflow_call:
    inputs:
      variant:
        description: "Image variant to build (its directory name, e.g. orin)."
        type: string
        required: true
      version:
        description: "Version for image labels and tag suffix."
        type: string
        required: true
      revision:
        description: "Git commit SHA for image labels."
        type: string
        required: true
      push:
        description: "Push images to the registry (only on releases)."
        type: boolean
        required: false
        default: false

permissions: {}

jobs:
  build:
    name: build
    runs-on: ubuntu-24.04-arm
    environment: ${{ inputs.push && 'release' || '' }}
    permissions:
      contents: read
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /opt/hostedtoolcache/CodeQL
          df -h /

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Install just
        run: sudo apt-get update && sudo apt-get install --no-install-recommends -y just

      - name: Set up Docker
        uses: docker/setup-docker-action@0234bb73ccb40f0c430b795634f9247e2b5c2d23 # v5
        with:
          daemon-config: |
            {
              "features": {
                "containerd-snapshotter": true
              }
            }

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: Expose GitHub Runtime
        uses: crazy-max/ghaction-github-runtime@04d248b84655b509d8c44dc1d6f990c879747487 # v4

      - name: Login to Docker Hub
        if: ${{ inputs.push }}
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build bootc container image
        run: |
          just \
            variant='${{ inputs.variant }}' \
            version='${{ inputs.version }}' \
            revision='${{ inputs.revision }}' \
            push='${{ inputs.push }}' \
            build \
              --set '*.cache-from=type=gha,scope=${{ inputs.variant }}' \
              --set '*.cache-to=type=gha,mode=max,scope=${{ inputs.variant }}'

      - name: Create disk image
        run: just variant='${{ inputs.variant }}' dist

      - name: Upload disk image artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: disk-image-${{ inputs.variant }}
          path: |
            *.img.zst
            *.img.zst.sha256
          if-no-files-found: error
          retention-days: 5
