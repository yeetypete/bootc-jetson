# Load the NVIDIA GPU and display stack at boot. On bootc the NVIDIA
# nv-load-display-modules.service is masked (it runs depmod against the read-only
# /usr), so depmod is baked at build time and the modules are loaded here instead.
#
# Orin uses the nvgpu variant. nvgpu must load first so it claims the GPU device
# before nvidia.ko registers its PCI driver. nvidia_drm then pulls in
# nvidia_modeset and nvidia via modules.dep.
nvgpu
nvidia_drm
