# _apt is intentionally omitted: systemd's basic.conf already provisions it,
# and redefining it here only produces a "Conflict ... ignoring line" warning.
u dhcpcd - "DHCP Client Daemon" /usr/lib/dhcpcd /bin/false
u ubuntu 1000 "Ubuntu" /home/ubuntu /bin/bash
u uuidd - "uuidd" /run/uuidd /usr/sbin/nologin
u sshd - "sshd privilege separation" /run/sshd /usr/sbin/nologin
g input -
g kvm -
g render -
g sgx -
g crypto -
g trusty -
g _ssh -
# NVIDIA's 99-tegra-devices.rules assigns the GPU debug/profiling nodes to group
# 'debug'. Without it udev logs "Unknown group 'debug'" and they stay root-only.
g debug -

# CUDA on the Orin iGPU opens the DRM render node /dev/dri/renderD128. Without
# render-group membership cuInit() fails with CUDA_ERROR_NOT_SUPPORTED (801).
m ubuntu render
