# _apt is intentionally omitted: systemd's basic.conf already provisions it,
# and redefining it here only produces a "Conflict ... ignoring line" warning.
u ubuntu 1000 "Ubuntu" /home/ubuntu /bin/bash
u uuidd - "uuidd" /run/uuidd /usr/sbin/nologin
u sshd - "sshd privilege separation" /run/sshd /usr/sbin/nologin
g input -
g kvm -
g render -
g sgx -
g _ssh -
# NVIDIA's 99-tegra-devices.rules (from nvidia-l4t-init) assigns the GPU
# debug/profiling device nodes (nvhost-dbg-gpu, nvhost-prof-gpu, etc.) to
# group 'debug'. Without it, udev logs "Unknown group 'debug', ignoring" for
# each rule and those nodes fall back to root-only access.
g debug -

# CUDA on the Orin iGPU opens the DRM render node /dev/dri/renderD128
# (root:render 0660). Without render-group membership, cuInit() fails with
# CUDA_ERROR_NOT_SUPPORTED (801) for non-root users. Add ubuntu to render.
m ubuntu render
