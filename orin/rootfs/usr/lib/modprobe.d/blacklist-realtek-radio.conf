# Disable the onboard Realtek RTL8822CE WiFi/BT radio on this wired-only node.
# blacklist alone is not enough (udev auto-loads via modalias), so redirect the
# install to /bin/false too.
blacklist rtl8822ce
install rtl8822ce /bin/false
blacklist rtk_btusb
install rtk_btusb /bin/false
blacklist btusb
install btusb /bin/false
