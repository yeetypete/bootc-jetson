# Symlink /var/lib/dpkg to its relocated path in /usr/lib/sysimage. The dpkg
# database lives in /usr so it persists across ostree image updates, since content
# in /var is only applied at initial provisioning. This mirrors rpm's
# /usr/lib/sysimage/rpm.
L+ /var/lib/dpkg - - - - /usr/lib/sysimage/dpkg
