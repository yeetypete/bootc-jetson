# Masks the stock systemd-resolve.conf, changing L! to L+. The builder bind-mounts
# /etc/resolv.conf during the build, leaving a zero-sized file that blocks the L!
# symlink. bootc's cleanup_root only strips the ostree-native usr/etc path, not
# etc/resolv.conf. L+ forces replacement at every boot.
# https://github.com/bootc-dev/bootc/issues/1064
L+ /etc/resolv.conf - - - - ../run/systemd/resolve/stub-resolv.conf
