# Newer dracut requires these to be set explicitly.
systemdsystemconfdir=/etc/systemd/system
systemdsystemunitdir=/usr/lib/systemd/system

# The bootc dracut module (51bootc) never auto-installs and must be requested.
# It provides bootc-root-setup.service / initramfs-setup, which sets up /sysroot
# as a composefs/ostree deployment.
add_dracutmodules+=" ostree bootc "

# composefs-rs (rhel9 feature) mounts the EROFS composefs image via a loopback
# device. The Jetson 6.8 kernel lacks file-backed EROFS (6.12+). The bootc module
# only installs erofs + overlay, so force-load loop before bootc-root-setup runs.
force_drivers+=" loop "
add_drivers+=" loop erofs overlay "
