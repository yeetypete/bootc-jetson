# Disable the onboard Realtek RTL8852CE WiFi/BT radio on this wired-only node.
# blacklist alone is not enough (udev auto-loads via modalias), so redirect the
# install to /bin/false too.
blacklist rtl8852ce
install rtl8852ce /bin/false
blacklist rtk_btusb
install rtk_btusb /bin/false
blacklist btusb
install btusb /bin/false
