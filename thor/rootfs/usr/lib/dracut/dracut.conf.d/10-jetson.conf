# Newer dracut requires these to be set explicitly.
systemdsystemconfdir=/etc/systemd/system
systemdsystemunitdir=/usr/lib/systemd/system

# The bootc dracut module never auto-installs and must be requested. It sets up
# /sysroot as a composefs deployment via bootc-root-setup.service and pulls in
# the erofs + overlay kernel modules.
add_dracutmodules+=" bootc "
