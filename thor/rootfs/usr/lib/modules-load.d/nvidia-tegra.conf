# Load the NVIDIA GPU and display stack at boot, since bootc masks
# nv-load-display-modules.service (it depmods read-only /usr).
# On the openrm variant (tegra264/Thor), nvidia_drm pulls in nvidia_modeset and
# nvidia via modules.dep. nvidia in turn pulls nv_gpu_static_pg (softdep pre) and
# nvidia_uvm (softdep post). nvgpu is not used on this variant.
nvidia_drm
